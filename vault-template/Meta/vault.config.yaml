# Scriptorium Vault Configuration
# This is the single source of truth for all vault paths.
# Agents read this file before referencing any vault section.
# To rename a section, change it here — nowhere else.

schema_version: 1

sections:
  inbox: Atrium            # raw capture, unprocessed input
  knowledge: Codex         # permanent knowledge notes, by domain
  log: Annals              # chronological records (meetings, journals)
  reference: Cartulary     # external sources and saved material
  active: Compendium       # active projects and responsibilities
  archive: Reliquary       # completed projects, dormant work
  system: Meta             # agent state, registry, templates, ledger

system_paths:
  domain_registry: Meta/registry/domains.yaml
  session_ledger:  Meta/ledger/session.yaml
  templates:       Meta/templates
  state:           Meta/state
  audit_reports:   Meta/ledger

naming:
  inbox_file:      "YYYY-MM-DD.inbox.md"
  knowledge_note:  "title-slug.md"
  log_meeting:     "YYYY-MM-DD.meeting.md"
  log_journal:     "YYYY-MM-DD.journal.md"
  log_daily:       "YYYY-MM-DD.daily.md"
  log_review:      "YYYY-WXX.review.md"
  reference_note:  "author--title-slug.md"
  synthesis_note:  "synthesis--topic-slug.md"
  project_brief:   "_brief.md"
  section_index:   "_index.md"

# Per-skill configuration.
# Each key under `skills` maps to a skill name (from the skill's `name:` frontmatter).
# Skills read their params from here instead of hardcoding paths.
skills:
  research-github-org:
    # Required: path to the scoring criteria doc the skill uses in Phase 4.
    criteria_file: Compendium/<project-slug>/lead-qualification-criteria.md
    # Required: directory where per-org research notes are written.
    output_dir: Compendium/<project-slug>/repo-research
    # Optional: file mapping org display names to GitHub slugs.
    org_list_file: Compendium/<project-slug>/github-orgs.md
    # Optional: section index to append a summary entry after each research run.
    index_file: Compendium/<project-slug>/_index.md
    # Optional: value written to the `project:` field in saved note frontmatter.
    project_tag: ""
